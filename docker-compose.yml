version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — primary data store
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-playto_payout}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis — Celery broker + result backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Django API server
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: db
      DB_NAME: ${DB_NAME:-playto_payout}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-change-in-prod}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py shell < scripts/seed.py &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"

  # ---------------------------------------------------------------------------
  # Celery worker — processes payout tasks
  # ---------------------------------------------------------------------------
  celery:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: db
      DB_NAME: ${DB_NAME:-playto_payout}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-change-in-prod}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery worker --loglevel=info --concurrency=2

  # ---------------------------------------------------------------------------
  # Celery Beat — periodic tasks (detect_stuck_payouts every 15s)
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: db
      DB_NAME: ${DB_NAME:-playto_payout}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-change-in-prod}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery beat --loglevel=info

  # ---------------------------------------------------------------------------
  # React frontend (dev server with hot reload)
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ""
      BACKEND_URL: "http://web:8000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - web

volumes:
  postgres_data:
