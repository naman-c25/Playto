[deploy]
startCommand = "echo Starting on PORT=$PORT && python manage.py migrate --noinput && exec gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 1 --timeout 120 --log-level debug --access-logfile - --error-logfile -"
healthcheckPath = "/api/v1/health/"
healthcheckTimeout = 60
